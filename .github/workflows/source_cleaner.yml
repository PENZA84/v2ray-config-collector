name: "🧹 Чистильщик Источников"

on:
  workflow_dispatch: # Кнопка для ручного запуска

jobs:
  clean:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install
        run: pip install requests

      - name: Sort and Clean
        run: |
          python <<EOF
          import requests
          from concurrent.futures import ThreadPoolExecutor
          import os

          # ПУТИ К ФАЙЛАМ
          SRC = "v2ray_config_collector/data/sources/sources.txt"
          ARCHIVE = "cleaned_urls.txt"

          def is_alive(url):
              try:
                  # Быстрая проверка (7 секунд таймаут)
                  r = requests.get(url, timeout=7, stream=True, headers={'User-Agent': 'Mozilla/5.0'})
                  if r.status_code == 200:
                      return url
              except:
                  return None
              return None

          if os.path.exists(SRC):
              with open(SRC, "r", encoding="utf-8") as f:
                  # Убираем явные дубли строк сразу
                  input_urls = list(set(line.strip() for line in f if line.strip()))
              
              print(f"📡 В очереди на проверку: {len(input_urls)} ссылок...")

              archive_set = set()
              if os.path.exists(ARCHIVE):
                  with open(ARCHIVE, "r", encoding="utf-8") as f:
                      archive_set = set(line.strip() for line in f if line.strip())

              # Ускоряем проверку в 50 потоков 🚀
              with ThreadPoolExecutor(max_workers=50) as executor:
                  results = list(executor.map(is_alive, input_urls))

              alive_urls = set(r for r in results if r)
              
              to_stay = []
              to_archive = []

              for url in input_urls:
                  # Если ссылка мертвая ИЛИ уже была в архиве
                  if url not in alive_urls or url in archive_set:
                      to_archive.append(url)
                  else:
                      # Живая и новая!
                      to_stay.append(url)
                      # Добавляем в архивный сет на лету, чтобы не брать дубли в этом же списке
                      archive_set.add(url)

              # Обновляем рабочий файл для Завода
              with open(SRC, "w", encoding="utf-8") as f:
                  for url in to_stay:
                      f.write(url + "\n")
              
              # Сбрасываем мусор в архив
              if to_archive:
                  with open(ARCHIVE, "a", encoding="utf-8") as f:
                      for url in set(to_archive):
                          f.write(url + "\n")
              
              print(f"✅ Результат: {len(to_stay)} в работе, {len(to_archive)} ушло в архив.")
          EOF

      - name: Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "🧹 Порядок наведен: только живое топливо для завода! 💋🍀"
            git push origin main
          fi
