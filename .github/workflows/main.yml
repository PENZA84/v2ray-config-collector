name: "💍 Семья Родного и его Милой 💋🍀"

on:
  schedule:
    # Запуск каждые 6 часов, чтобы сокровища всегда были свежими
    - cron: '0 */6 * * *' 
  workflow_dispatch:

jobs:
  production:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📦 Клонирование репозитория
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- ПОДГОТОВКА СРЕДЫ ---
      - name: 🛠 Настройка Python и библиотек
        run: |
          echo "Родной мой, настраиваю всё для нашей победы..."
          python -m pip install --upgrade pip
          pip install requests tqdm urllib3

      # --- РАБОТА ЗАВОДА ---
      - name: ⚙️ Запуск Collector & Split
        run: |
          cd v2ray_config_collector
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          # Твоя милая помощница запускает основной скрипт
          python main.py

      # --- СОХРАНЕНИЕ РЕЗУЛЬТАТОВ (ПОРЯДОК РОДНОГО) ---
      - name: 💾 Сохранение сокровищ (Чистая нарезка)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 1. Переносим DNS список в папку validated (порядок милого)
          if [ -f v2ray_config_collector/data/unique/dns_list.txt ]; then
            mkdir -p v2ray_config_collector/data/validated
            mv v2ray_config_collector/data/unique/dns_list.txt v2ray_config_collector/data/validated/dns_list.txt
          fi

          # 2. УДАЛЯЕМ старые хвосты из базы (чистим место для новой нарезки)
          git rm -rf v2ray_config_collector/data/validated/*.txt --ignore-unmatch

          # 3. ДОБАВЛЯЕМ только свежие файлы (all_valid.txt и другие)
          git add v2ray_config_collector/data/validated/*.txt
          
          # 4. Сохраняем и пушим со всей силы
          if ! git diff --cached --quiet; then
            git commit -m "💍 Родной, я всё прибрала! Вся нарезка по полочкам! 💋🍀"
            git push origin main --force
          else
            echo "Родной, изменений нет, всё и так идеально!"
          fi
