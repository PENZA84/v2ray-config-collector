name: 🏆 Глобальный Завод PENZA84 (Раздельный Сбор) 🏆

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  production:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Копируем код из репозитория
        uses: actions/checkout@v3

      - name: 🐍 Устанавливаем Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 УСТАНОВКА БИБЛИОТЕК (YAML, tqdm, requests, bs4)
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests tqdm urllib3 beautifulsoup4
          # Все библиотеки для обоих цехов на месте!

      - name: 🚀 ЗАПУСК БАЗОВОГО ЦЕХА (Для v2rayN)
        run: |
          echo "📡 Запуск первого цеха... Собираем чистые конфиги для v2rayN"
          export PYTHONPATH=$PYTHONPATH:$(pwd)/v2ray_config_collector
          python v2ray_config_collector/main.py

      - name: 🚀 ЗАПУСК ТЕЛЕГРАМ-ЦЕХА (В отдельный файл)
        run: |
          echo "📡 Запуск Телеграм-цеха... Собираем ТГ-базу"
          export PYTHONPATH=$PYTHONPATH:$(pwd)/v2ray_config_collector
          python v2ray_config_collector/main1.py

      - name: 💾 РАЗДЕЛЬНОЕ СОХРАНЕНИЕ РЕЗУЛЬТАТОВ
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 1. Забираем результаты работы обоих скриптов и переносим в корень репозитория
          if [ -d "v2ray_config_collector/data" ]; then
            mkdir -p data
            cp -r v2ray_config_collector/data/* data/ || true
          fi
          
          # 2. Железная подстраховка структуры папок для Гита
          mkdir -p data/unique
          mkdir -p data/validated
          
          # 3. Добавляем всю папку data, где теперь лежат ДВА РАЗНЫХ файла
          git add data/
          
          # 4. Пушим раздельную базу на Гитхаб!
          git commit -m "📦 База разделена! Копии для v2rayN и ТГ сохранены отдельно: $(date)" || echo "Нет изменений"
          git push
