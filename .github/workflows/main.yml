name: Source Cleaner

on:
  workflow_dispatch: # Это создаёт ту самую кнопку запуска

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install
        run: pip install requests

      - name: Sort and Clean
        run: |
          python <<EOF
          import requests
          from concurrent.futures import ThreadPoolExecutor
          import os

          SRC = "v2ray_config_collector/data/sources/sources.txt"
          ARCHIVE = "cleaned_urls.txt"

          def is_alive(url):
              try:
                  r = requests.get(url, timeout=7, stream=True, headers={'User-Agent': 'Mozilla/5.0'})
                  return r.status_code == 200
              except:
                  return False

          if os.path.exists(SRC):
              with open(SRC, "r", encoding="utf-8") as f:
                  input_urls = [line.strip() for line in f if line.strip()]
              
              archive_set = set()
              if os.path.exists(ARCHIVE):
                  with open(ARCHIVE, "r", encoding="utf-8") as f:
                      archive_set = set(line.strip() for line in f if line.strip())

              to_stay = []
              to_archive = []
              seen = set()

              for url in input_urls:
                  if url in archive_set or url in seen:
                      to_archive.append(url)
                      continue
                  if is_alive(url):
                      to_stay.append(url)
                      seen.add(url)
                  else:
                      to_archive.append(url)

              with open(SRC, "w", encoding="utf-8") as f:
                  for url in to_stay:
                      f.write(url + "\n")
              
              if to_archive:
                  with open(ARCHIVE, "a", encoding="utf-8") as f:
                      for url in to_archive:
                          f.write(url + "\n")
          EOF

      - name: Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "🧹 Чистка базы выполнена 💋🍀"
            git push origin main
          fi
