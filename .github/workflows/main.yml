name: V2Ray Config Collector - Optimized

on:
  schedule:
    - cron: '0 */6 * * *' # Автозапуск каждые 6 часов
  workflow_dispatch:      # Кнопка для ручного запуска в меню Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Ставим всё необходимое для парсинга YAML и работы с сетью
          pip install requests tqdm pyyaml 

      - name: Run Collector and Validator
        run: |
          cd v2ray_config_collector
          # Добавляем путь в PYTHONPATH, чтобы Python видел папку core
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python main.py

      - name: Final Push to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Добавляем только полезные результаты: рабочие конфиги и DNS
          if [ -f v2ray_config_collector/data/validated/all_valid.txt ]; then
            git add -f v2ray_config_collector/data/validated/all_valid.txt
          fi
          
          if [ -f v2ray_config_collector/data/unique/dns_list.txt ]; then
            git add -f v2ray_config_collector/data/unique/dns_list.txt
          fi
          
          # 2. Закон очистки: обнуляем файл с грязными данными, чтобы он не копил мусор
          # Мы не удаляем файл (чтобы не сломать логику git), а просто заменяем содержимое пустотой
          if [ -f v2ray_config_collector/data/unique/deduplicated.txt ]; then
            echo "" > v2ray_config_collector/data/unique/deduplicated.txt
            git add -f v2ray_config_collector/data/unique/deduplicated.txt
          fi

          # 3. Финальный пуш, если есть изменения (новые прокси или очистка старых)
          if ! git diff --cached --quiet; then
            git commit -m "Update: fresh validated configs, cleaned raw data"
            git push origin main
          else
            echo "Изменений для фиксации не найдено. Всё уже актуально."
          fi
