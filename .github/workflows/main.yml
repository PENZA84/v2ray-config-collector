- name: Commit and push results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # === ЖЕСТКАЯ ОЧИСТКА ===
          # Сбрасываем все изменения, которые натворил скрипт, кроме папки с результатами
          echo "Принудительная очистка перед синхронизацией..."
          git add v2ray_config_collector/data/validated/working_configs/*.txt || true
          git stash || true 
          git clean -fd  # Удаляет все новые неотслеживаемые файлы (raw_configs.txt и прочее)
          
          # Теперь pull пройдет идеально
          git pull origin main --rebase

          # Возвращаем наши напарсенные конфиги из заначки
          git stash pop || true

          TARGET_DIR="v2ray_config_collector/data/sources/working_configs"
          SOURCE_DIR="v2ray_config_collector/data/validated/working_configs"
          mkdir -p "$TARGET_DIR"

          # Перенос (твои 8483 конфига)
          if [ -d "$SOURCE_DIR" ]; then
            cp "$SOURCE_DIR"/*.txt "$TARGET_DIR/" 2>/dev/null || true
          fi

          # Финальная зачистка перед пушем
          rm -rf v2ray_config_collector/data/validated/
          find . -name "raw_configs.txt" -delete || true
          
          git add "$TARGET_DIR/*.txt"
          git add .
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update configs: auto-cleanup and sync"
            git push origin main
          else
            echo "No changes"
          fi
