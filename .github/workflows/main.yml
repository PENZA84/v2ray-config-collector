name: Глобальный Завод PENZA84 (Раздельный Сбор)

on:
  schedule:
    - cron: '0 */4 * * *' # Автозапуск каждые 4 часа
  workflow_dispatch: # Кнопка ручного запуска

permissions:
  contents: write # Права на запись результатов на склад

jobs:
  production:
    name: производство
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Копируем код из репозитория
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: 🐍 Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 Установка библиотек (Зависимостей Завода)
        run: |
          pip install requests beautifulsoup4 pyyaml

      - name: 📡 ЗАПУСК БАЗОВОГО ЦЕХА (для v2rayN)
        run: |
          echo "📡 Запуск первого цеха... Собираем чистые конфиги для v2rayN из sources.txt"
          python v2ray_config_collector/main.py

      - name: 📡 ЗАПУСК ТЕЛЕГРАМ-ЦЕХА (в отдельный файл)
        run: |
          echo "📡 Запуск Телеграм-цеха... Собираем базу ТГ из sources1.txt"
          python v2ray_config_collector/main1.py

      - name: 💾 РАЗДЕЛЬНОЕ ХРАНЕНИЕ РЕЗУЛЬТАТОВ (Бронебойный Пуш)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Robot"
          
          # 🔥 РАСШИРЕНИЕ БУФЕРА GIT ДО 2 ГИГАБАЙТ (Чтобы не было ошибки HTTP 408)
          git config --global http.postBuffer 2097152000
          git config --global http.maxRequestSize 2097152000
          git config --global ssh.postBuffer 2097152000
          
          # Отключаем таймауты и проверку медленного интернета на серверах GitHub
          git config --global http.lowSpeedLimit 0
          git config --global http.lowSpeedTime 999999
          
          # Добавляем обновленные файлы
          git add data/unique/*.txt
          
          if git diff --cached --quiet; then
            echo "📊 Изменений нет, база уже актуальна."
          else
            git commit -m "📦 База разделена! Добавлено огромное обновление конфигов: $(date -u +'%d.%m.%Y %H:%M:%S') UTC"
            
            # Тянем изменения и пушим с расширенным буфером
            git pull --rebase origin main
            git push origin main
          fi
