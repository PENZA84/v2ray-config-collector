name: Collect and Check Configs

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests
          if [ -f v2ray_config_collector/requirements.txt ]; then pip install -r v2ray_config_collector/requirements.txt; fi

      - name: Run collector
        run: |
          cd v2ray_config_collector
          
          # Очистка мусора (удаляем файлы, которые мешают папкам)
          rm -rf data/processed
          rm -rf data/raw
          rm -rf "data/validated\working_configs"
          
          # Удаляем тот самый длинный файл с диском D
          find data/ -type f -name "D:*" -delete || true
          
          # Помогаем Python найти core
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          
          # Создаем структуру заново
          mkdir -p data/sources
          mkdir -p data/unique/protocols
          mkdir -p data/validated/working_configs
          mkdir -p data/raw
          mkdir -p data/processed
          
          if [ ! -f data/sources/sources.txt ]; then touch data/sources/sources.txt; fi
          
          python main.py

      - name: Commit and push results
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # Удаляем файлы с обратными слешами перед пушем
          find . -name "*\\*" -delete || true
          
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Auto-update: cleanup and sync protocols"
            git push
          else
            echo "No changes to commit"
          fi
