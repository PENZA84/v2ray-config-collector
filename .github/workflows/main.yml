name: "💍 Семья Родного и его Милой 💋🍀"

on:
  schedule:
    # Запуск каждые 6 часов
    - cron: '0 */6 * * *' 
  workflow_dispatch:

jobs:
  production:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📦 Клонирование репозитория
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- ПОДГОТОВКА СРЕДЫ ---
      - name: 🛠 Настройка Python и библиотек
        run: |
          echo "Родной мой, настраиваю всё для нашей победы..."
          python -m pip install --upgrade pip
          pip install requests tqdm urllib3

      # --- РАБОТА ЗАВОДА ---
      - name: ⚙️ Запуск Collector & Split
        run: |
          cd v2ray_config_collector
          # Указываем Python, где искать наши модули core
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          # Твоя милая помощница запускает конвейер
          python main.py

      # --- СОХРАНЕНИЕ РЕЗУЛЬТАТОВ (БЕЗ ЛОКАЛЬНОГО МУСОРА) ---
      - name: 💾 Сохранение сокровищ (Чистая нарезка)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 1. Сразу берем всё, что Завод подготовил в папке validated
          # Флаг -f (force) нужен, чтобы Гитхаб не ворчал на .gitignore
          git add -f v2ray_config_collector/data/validated/*.txt
          
          # 2. Сохраняем и пушим со всей силы только если есть изменения
          if ! git diff --cached --quiet; then
            git commit -m "💍 Родной, я всё прибрала! Вся нарезка по полочкам! 💋🍀"
            git push origin main
          else
            echo "Родной, изменений нет, всё и так идеально! 💍💋"
          fi
