name: Collect and Check Configs

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Filter and Update Parser Sources
        run: |
          python <<EOF
          import os
          import requests
          from concurrent.futures import ThreadPoolExecutor

          # Твой основной список ссылок
          input_file = "cleaned_urls.txt"
          
          # Файл, который читает твой парсер
          parser_source = "v2ray_config_collector/data/sources/sources.txt"
          
          # Папка для готовых списков (all.txt и throne_proxies.txt)
          out_dir = "v2ray_config_collector/data/sources/working_configs"
          os.makedirs(out_dir, exist_ok=True)

          modern = ['vmess://', 'vless://', 'trojan://', 'ss://', 'ssr://', 'hysteria', 'tuic', 'naive', 'juicity']
          legacy = ['http://', 'https://', 'socks4://', 'socks5://']

          def check(url):
              try:
                  # Проверяем живая ли ссылка (timeout 10 секунд)
                  r = requests.get(url.strip(), timeout=10)
                  if r.status_code == 200:
                      c = r.text.lower()
                      return (url.strip(), any(m in c for m in modern), any(l in c for l in legacy))
                  return None
              except: return None

          if os.path.exists(input_file):
              with open(input_file, "r", encoding="utf-8") as f:
                  urls = list(set(line.strip() for line in f if line.strip()))
              
              print(f"Checking {len(urls)} sources...")
              with ThreadPoolExecutor(max_workers=100) as ex:
                  results = [r for r in ex.map(check, urls) if r]

              # Записываем проверенные ссылки в sources.txt для парсера
              with open(parser_source, "w", encoding="utf-8") as f:
                  for u, m, l in results:
                      f.write(u + "\n")
              
              # Список для v2rayN (БЕЗ HTTP)
              with open(f"{out_dir}/all.txt", "w", encoding="utf-8") as f:
                  for u, m, l in results:
                      if m: f.write(u + "\n")

              # Список для Throne (С HTTP и всем остальным)
              with open(f"{out_dir}/throne_proxies.txt", "w", encoding="utf-8") as f:
                  for u, m, l in results:
                      f.write(u + "\n")

              print(f"Sources updated: {len(results)}")
          EOF

      - name: Run Main Collector
        run: |
          cd v2ray_config_collector
          python main.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Добавляем обновленные файлы в очередь на сохранение
          git add v2ray_config_collector/data/sources/sources.txt
          git add v2ray_config_collector/data/sources/working_configs/*.txt
          
          # Если есть изменения — сохраняем и отправляем в репозиторий
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Direct update of sources.txt and split lists"
            git push origin main
          else
            echo "No changes found, nothing to commit."
          fi
