name: V2Ray Config Collector - Optimized

on:
  schedule:
    - cron: '0 */6 * * *' # Запуск каждые 6 часов
  workflow_dispatch:      # Кнопка ручного запуска

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # ОБЯЗАТЕЛЬНО добавляем pyyaml для работы парсера
          pip install requests tqdm pyyaml 

      - name: Run Collector and Validator
        run: |
          cd v2ray_config_collector
          # Добавляем текущую папку в пути поиска модулей
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python main.py

      - name: Final Push to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Добавляем ВСЕ результаты работы:
          # 1. Рабочие прокси (validated)
          # 2. Список DNS (из папки unique), если он создался
          git add v2ray_config_collector/data/validated/all_valid.txt || true
          git add v2ray_config_collector/data/unique/dns_list.txt || true
          
          # Проверяем, есть ли что коммитить
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update: fresh validated configs and DNS list"
            git push origin main
          else
            echo "Никаких изменений не найдено."
          fi
