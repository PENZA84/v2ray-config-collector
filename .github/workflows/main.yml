- name: Commit and push results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 1. ОЧИСТКА ТЯЖЕЛЫХ ВРЕМЕННЫХ ФАЙЛОВ (чтобы репозиторий не весил 100Мб+)
          # Удаляем огромный JSON и сырой текст, но оставляем папки
          rm -f v2ray_config_collector/data/processed/*.json || true
          rm -f v2ray_config_collector/data/raw/*.txt || true
          
          # 2. УДАЛЯЕМ МУСОРНЫЕ ФАЙЛЫ WINDOWS (которые создают ошибки)
          find . -name "*\\*" -delete || true
          find . -name "D:*" -delete || true

          # 3. СОХРАНЯЕМ СТРУКТУРУ (git add по конкретным целям)
          # Сохраняем только самое важное из unique (протоколы)
          git add v2ray_config_collector/data/unique/protocols/*.txt || true
          
          # Сохраняем ТВОЁ ГЛАВНОЕ (полностью рабочие тесты)
          git add v2ray_config_collector/data/validated/working_configs/*.txt || true
          
          # Сохраняем источники
          git add v2ray_config_collector/data/sources/*.txt || true

          # 4. ФИНАЛЬНЫЙ СИНХРОН
          # Добавляем пустые папки (через .gitkeep если они есть) или оставшиеся файлы
          git add .

          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Efficiency update: Saved only working protocols and validated configs"
            git push origin main
          else
            echo "Nothing new to save"
          fi
