name: Глобальный Завод PENZA84 (Раздельный Сбор)

on:
  schedule:
    - cron: '0 */4 * * *' # Автозапуск каждые 4 часа
  workflow_dispatch: # Кнопка ручного запуска

permissions:
  contents: write

jobs:
  production:
    name: производство
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Копируем код из репозитория
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: 🐍 Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 Установка библиотек (Зависимостей Завода)
        run: |
          pip install requests beautifulsoup4 pyyaml

      - name: 📡 ЗАПУСК БАЗОВОГО ЦЕХА (для v2rayN)
        run: |
          python v2ray_config_collector/main.py

      - name: 📡 ЗАПУСК ТЕЛЕГРАМ-ЦЕХА (в отдельный файл)
        run: |
          python v2ray_config_collector/main1.py

      - name: 💾 РАЗДЕЛЬНОЕ ХРАНЕНИЕ РЕЗУЛЬТАТОВ (Чистый Пуш пронумерованных и ТГ баз)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Robot"
          
          git config --global http.postBuffer 2097152000
          
          # 🚨 Подчищаем старые тяжелые нераспиленные файлы из индекса Git (если они там висели)
          git rm --cached data/unique/deduplicated.txt || true
          git rm --cached data/unique/vless.txt || true
          git rm --cached data/unique/vmess.txt || true
          
          # Забираем на склад абсолютно ВСЕ новые легкие файлы (и базовые, и ТГ!)
          git add data/unique/*.txt

          if git diff --cached --quiet; then
            echo "📊 На складе идеальный порядок, новых изменений нет."
          else
            git commit -m "📦 Конвейер PENZA84: Базы нарезаны! Созданы vless1.txt и ТГvless1.txt без превышения лимитов!"
            git pull --rebase origin main
            git push origin main
          fi
