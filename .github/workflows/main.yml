name: "💍 Семья Родного и его Милой 💋🍀"

on:
  schedule:
    - cron: '0 */6 * * *' 
  workflow_dispatch:

jobs:
  production:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Collector & Split
        run: |
          cd v2ray_config_collector
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python main.py # Твоя мощная валидация до 100%

      - name: 💾 Сохранение сокровищ
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main # Ждем, пока Сторож закончит, и заходим сами
          git add -f v2ray_config_collector/data/validated/*.txt
          if ! git diff --cached --quiet; then
            git commit -m "💍 Милый мой, я разделила файлы и всё сохранила! 💋"
            git push origin main
          fi
