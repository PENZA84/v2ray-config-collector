- name: Commit and push results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 1. ПРИНУДИТЕЛЬНО УДАЛЯЕМ ВСЁ ЛИШНЕЕ ПЕРЕД СОХРАНЕНИЕМ
          # Удаляем сырые данные и промежуточные уникальные (но не проверенные) файлы
          rm -rf v2ray_config_collector/data/raw
          rm -rf v2ray_config_collector/data/processed
          rm -rf v2ray_config_collector/data/unique/deduplicated.json
          rm -rf v2ray_config_collector/data/unique/deduplicated.txt
          
          # Если хочешь удалить и папку protocols внутри unique (оставив только validated):
          # rm -rf v2ray_config_collector/data/unique/protocols

          # 2. Очищаем мусорные файлы с путями Windows
          find . -name "*\\*" -delete || true
          find . -name "D:*" -delete || true

          # 3. ДОБАВЛЯЕМ ТОЛЬКО ТО, ЧТО ПРОШЛО ТЕСТ
          # Добавляем папку с полностью рабочими конфигами
          git add v2ray_config_collector/data/validated/working_configs/
          
          # Добавляем источники (чтобы не потерять настройки)
          git add v2ray_config_collector/data/sources/

          # 4. Финальный пуш
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Pure Result: $(date +'%H:%M') - Only Validated Configs Saved"
            git push origin main
          else
            echo "No changes - maybe no new valid configs found"
          fi
