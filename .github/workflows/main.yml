name: 🏆 Глобальный Завод PENZA84 🏆

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  production:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Копируем код из репозитория
        uses: actions/checkout@v3

      - name: 🐍 Устанавливаем Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 УСТАНОВКА БИБЛИОТЕК (YAML, tqdm, requests)
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests tqdm urllib3
          # Теперь YAML точно будет на месте!

      - name: 🚀 ЗАПУСК ОСНОВНОГО ЦЕХА
        run: |
          # Добавляем путь, чтобы Python видел папку core
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python v2ray_config_collector/main.py

      - name: 💾 СОХРАНЕНИЕ РЕЗУЛЬТАТОВ
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git commit -m "📦 Обновление базы: $(date)" || echo "Нет изменений"
          git push
