name: Глобальный Завод PENZA84 (Раздельный Сбор)

on:
  schedule:
    - cron: '0 */4 * * *' # Автозапуск каждые 4 часа
  workflow_dispatch: # Кнопка ручного запуска

permissions:
  contents: write

jobs:
  production:
    name: производство
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Копируем код из репозитория
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: 🐍 Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 Установка библиотек (Зависимостей Завода)
        run: |
          pip install requests beautifulsoup4 pyyaml

      - name: 📡 ЗАПУСК БАЗОВОГО ЦЕХА (для v2rayN)
        run: |
          python v2ray_config_collector/main.py

      - name: 📡 ЗАПУСК ТЕЛЕГРАМ-ЦЕХА (в отдельный файл)
        run: |
          python v2ray_config_collector/main1.py

      - name: 💾 РАЗДЕЛЬНОЕ ХРАНЕНИЕ РЕЗУЛЬТАТОВ (Жесткая зачистка старых баз и пуш цепочек)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Robot"
          
          git config --global http.postBuffer 2097152000
          
          # 🔥 ЖЕСТКО УДАЛЯЕМ СТАРЫЕ ТЯЖЕЛЫЕ ФАЙЛЫ ИЗ РЕПОЗИТОРИЯ (чтобы не было ошибок со скринов)
          # Удаляем файлы без цифр из отслеживания Git и физически
          git rm -f data/unique/deduplicated.txt || true
          git rm -f data/unique/vless.txt || true
          git rm -f data/unique/vmess.txt || true
          git rm -f data/unique/ss.txt || true
          git rm -f data/unique/trojan.txt || true
          git rm -f data/unique/naive.txt || true
          git rm -f data/unique/hy2.txt || true
          git rm -f data/unique/hysteria2.txt || true
          git rm -f data/unique/juicity.txt || true
          git rm -f data/unique/tuic.txt || true
          
          # Добавляем абсолютно все новые нарезанные цепочки
          git add data/unique/*.txt

          if git diff --cached --quiet; then
            echo "📊 Изменений нет, все цепочки в порядке."
          else
            git commit -m "📦 Конвейер PENZA84: Полный переход на легкие цепочки vless1.txt и ТГvless1.txt!"
            git pull --rebase origin main
            git push origin main
          fi
