name: Collect and Check Configs

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests tqdm

      # 1. ЭТАП СБОРЩИКА: Просто готовим свежие ссылки (24ч) для парсера
      - name: Sync Fresh Sources
        run: |
          python <<EOF
          import os, requests
          from datetime import datetime, timedelta, timezone
          
          input_file = "cleaned_urls.txt"
          target = "v2ray_config_collector/data/sources/sources.txt"
          FRESH_LIMIT = timedelta(hours=24)
          now = datetime.now(timezone.utc)
          
          fresh_urls = []
          if os.path.exists(input_file):
              with open(input_file, "r") as f:
                  urls = [u.strip() for u in f if u.strip()]
              for u in urls:
                  try:
                      r = requests.head(u, timeout=10)
                      mod = r.headers.get('Last-Modified')
                      if mod:
                          d = datetime.strptime(mod, '%a, %d %b %Y %H:%M:%S %Z').replace(tzinfo=timezone.utc)
                          if now - d < FRESH_LIMIT: fresh_urls.append(u)
                      else: fresh_urls.append(u) # Если даты нет, рискуем
                  except: continue
          
          os.makedirs(os.path.dirname(target), exist_ok=True)
          with open(target, "w") as f:
              f.write("\n".join(fresh_urls))
          EOF

      # 2. ЭТАП ПАРСЕРА: Он делает только свою работу (как на скрине 790)
      - name: Run Main Collector
        run: |
          cd v2ray_config_collector
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python main.py

      # 3. ЭТАП ЦЕМЕНТА: Дробление и сортировка результатов ПАРСИНГА
      - name: Split and Sort Results
        run: |
          python <<EOF
          import os
          
          # Путь к тому, что выдал парсер
          source_dir = "v2ray_config_collector/data/sources"
          results_file = os.path.join(source_dir, "working_configs/all_working.txt")
          proto_dir = os.path.join(source_dir, "protocols")
          
          if os.path.exists(results_file):
              with open(results_file, "r", encoding="utf-8") as f:
                  all_configs = sorted(list(set(line.strip() for line in f if line.strip())))
              
              total = len(all_configs)
              MAX_PER_FILE = 500000
              
              # Дробим на all.txt, all1.txt...
              for i in range(0, total, MAX_PER_FILE):
                  idx = i // MAX_PER_FILE
                  suffix = "" if idx == 0 else str(idx)
                  with open(os.path.join(source_dir, f"all{suffix}.txt"), "w") as f:
                      f.write("\n".join(all_configs[i:i+MAX_PER_FILE]))
              
              # Сортируем по протоколам
              os.makedirs(proto_dir, exist_ok=True)
              protos = ["vless", "vmess", "trojan", "ss", "ssr", "hysteria2", "tuic"]
              for p in protos:
                  p_configs = [c for c in all_configs if c.startswith(f"{p}://")]
                  if p_configs:
                      with open(os.path.join(proto_dir, f"{p}.txt"), "w") as f:
                          f.write("\n".join(p_configs))
          EOF

      - name: Final Push to PENZA84
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add v2ray_config_collector/data/sources/*.txt
          git add v2ray_config_collector/data/sources/protocols/*.txt
          git commit -m "Clean split of parsed configs - Cement Strategy" || exit 0
          git push origin main
