name: Глобальный Завод PENZA84 (Раздельный Сбор)

on:
  schedule:
    - cron: '0 */4 * * *' # Автозапуск каждые 4 часа
  workflow_dispatch: # Кнопка ручного запуска

permissions:
  contents: write # Даем Гитхабу железные права на запись файлов!

jobs:
  production:
    name: производство
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Копируем код из репозитория
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: 🐍 Установка Python
        uses: actions/setup-python@v5
        with:
          python-python: '3.10'
          cache: 'pip'

      - name: 📦 Установка библиотек (Зависимостей Завода)
        run: |
          pip install requests beautifulsoup4 pyyaml

      - name: 📡 ЗАПУСК БАЗОВОГО ЦЕХА (для v2rayN)
        run: |
          echo "📡 Запуск первого цеха... Собираем чистые конфиги для v2rayN из sources.txt"
          python v2ray_config_collector/main.py

      - name: 📡 ЗАПУСК ТЕЛЕГРАМ-ЦЕХА (в отдельный файл)
        run: |
          echo "📡 Запуск Телеграм-цеха... Собираем базу ТГ из sources1.txt"
          python v2ray_config_collector/main1.py

      - name: 💾 РАЗДЕЛЬНОЕ ХРАНЕНИЕ РЕЗУЛЬТАТОВ (Бронебойный Пуш)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Robot"
          
          # Добавляем все измененные и новые файлы протоколов
          git add data/unique/*.txt
          
          # Проверяем, есть ли вообще изменения, чтобы Гитхаб не ругался на пустой коммит
          if git diff --cached --quiet; then
            echo "📊 Изменений нет, склад уже забит свежими конфигами."
          else
            git commit -m "📦 База разделена! Копии для v2rayN и Telegram сохранены отдельно: $(date -u +'%d.%m.%Y %H:%M:%S') UTC"
            
            # Бронебойный пуш с подтягиванием изменений, если ветка обновилась
            git pull --rebase origin main
            git push origin main
          fi
