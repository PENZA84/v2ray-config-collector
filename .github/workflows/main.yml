name: V2Ray Config Collector - Optimized

on:
  schedule:
    - cron: '0 */6 * * *' # Запуск каждые 6 часов
  workflow_dispatch:      # Кнопка для ручного запуска

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Устанавливаем всё: requests для скачивания, tqdm для логов, pyyaml для DNS и Clash
          pip install requests tqdm pyyaml 

      - name: Run Collector and Validator
        run: |
          cd v2ray_config_collector
          # Добавляем путь, чтобы скрипты видели папку core
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python main.py

      - name: Final Push to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Флаг -f принудительно добавляет файлы, даже если они в .gitignore
          # Используем проверку [ -f ... ], чтобы скрипт не падал, если файл не создался
          if [ -f v2ray_config_collector/data/validated/all_valid.txt ]; then
            git add -f v2ray_config_collector/data/validated/all_valid.txt
          fi
          
          if [ -f v2ray_config_collector/data/unique/dns_list.txt ]; then
            git add -f v2ray_config_collector/data/unique/dns_list.txt
          fi

          # Сохраняем изменения, если они есть
          if ! git diff --cached --quiet; then
            git commit -m "Update: fresh validated configs and DNS list"
            git push origin main
          else
            echo "Изменений не найдено, пуш не требуется."
          fi
