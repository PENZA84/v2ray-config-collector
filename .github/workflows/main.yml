name: V2Ray Config Collector - Optimized

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests tqdm

      # Запускаем наш основной процесс (main.py сам всё вызовет)
      - name: Run Collector and Validator
        run: |
          cd v2ray_config_collector
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python main.py

      # Сохраняем результат: только наш чистый файл для Throne и v2rayN
      - name: Final Push to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Добавляем файл, который создал наш validator.py
          git add v2ray_config_collector/data/validated/all_valid.txt || true
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update: fresh validated configs for Sing-box & Throne"
            git push origin main
          else
            echo "Новых рабочих прокси не найдено, отдыхаем!"
          fi
