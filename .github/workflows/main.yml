- name: Commit and push results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Создаем твою целевую папку (на всякий случай)
          mkdir -p v2ray_config_collector/data/sources/working_configs/
          
          # 2. ПЕРЕНОСИМ ФАЙЛЫ
          # Берем то, что нагенерил скрипт, и перекидываем в твою папку
          cp v2ray_config_collector/data/validated/working_configs/*.txt v2ray_config_collector/data/sources/working_configs/ 2>/dev/null || true
          
          # 3. ОЧИСТКА (удаляем дубликаты и временные папки, чтобы не мусорить)
          rm -rf v2ray_config_collector/data/validated/
          find . -name "raw_configs.txt" -delete || true
          find . -name "*.json" -delete || true
          rm -rf v2ray_config_collector/data/raw/*.txt || true

          # 4. ДОБАВЛЯЕМ В GIT
          git add "v2ray_config_collector/data/sources/working_configs/*.txt"
          git add "v2ray_config_collector/data/sources/*.txt" || true
          
          # Пушим изменения
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Configs successfully moved to data/sources/working_configs"
            git push origin main
          else
            echo "No new configs to commit"
          fi
