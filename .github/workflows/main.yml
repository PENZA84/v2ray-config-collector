name: 🏆 Глобальный Завод PENZA84 🏆

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  production:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Копируем код из репозитория
        uses: actions/checkout@v3

      - name: 🐍 Устанавливаем Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 УСТАНОВКА БИБЛИОТЕК (YAML, tqdm, requests)
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests tqdm urllib3
          # Теперь YAML точно будет на месте!

      - name: 🚀 ЗАПУСК ОСНОВНОГО ЦЕХА
        run: |
          # Запуск из корня, как в твоем оригинале. Пути внутри Python не сломаются!
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python v2ray_config_collector/main.py

      - name: 💾 СОХРАНЕНИЕ РЕЗУЛЬТАТОВ
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 1. Если скрипты создали папку data внутри каталога v2ray_config_collector,
          # мы принудительно копируем файлы в КОРЕНЬ репозитория, чтобы структура была красивой:
          if [ -d "v2ray_config_collector/data" ]; then
            mkdir -p data
            cp -r v2ray_config_collector/data/* data/ || true
          fi
          
          # 2. Подстраховка: создаем папки в корне, если их почему-то не оказалось
          mkdir -p data/unique
          mkdir -p data/validated
          
          # 3. Добавляем корневую папку data в отслеживание Git
          git add data/
          
          # 4. Делаем коммит и пушим чистые базы, проверенные ядром Sing-Box
          git commit -m "📦 Обновление базы: $(date)" || echo "Нет изменений"
          git push
