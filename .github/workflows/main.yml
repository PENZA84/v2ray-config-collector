name: Collect and Check Configs

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests tqdm

      # 🔥 ШАГ: Проверка cleaned_urls.txt и слияние с основным списком
      - name: Merge and Clean Sources
        run: |
          python <<EOF
          import os
          import requests
          from concurrent.futures import ThreadPoolExecutor

          input_file = "cleaned_urls.txt"
          # Тот самый файл, который реально читает парсер
          target_file = "v2ray_config_collector/data/sources/sources.txt"

          def is_alive(url):
              try:
                  r = requests.get(url.strip(), timeout=5)
                  return url.strip() if r.status_code == 200 else None
              except: return None

          # 1. Проверяем новые ссылки из твоего файла
          if os.path.exists(input_file):
              with open(input_file, "r", encoding="utf-8") as f:
                  urls_to_check = [l.strip() for l in f if l.strip()]
              
              print(f"Checking {len(urls_to_check)} links from {input_file}...")
              with ThreadPoolExecutor(max_workers=50) as ex:
                  new_alive = [r for r in ex.map(is_alive, urls_to_check) if r]
          else:
              new_alive = []

          # 2. Читаем то, что уже было в базе
          existing = []
          if os.path.exists(target_file):
              with open(target_file, "r", encoding="utf-8") as f:
                  existing = [l.strip() for l in f if l.strip()]

          # 3. Соединяем, убираем дубли
          final_list = list(set(existing + new_alive))

          # 4. Сохраняем обратно в sources.txt
          with open(target_file, "w", encoding="utf-8") as f:
              for u in final_list:
                  f.write(u + "\n")
          
          print(f"Total sources now: {len(final_list)}")
          EOF

      - name: Commit Updated Sources
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add v2ray_config_collector/data/sources/sources.txt
          git commit -m "Merged cleaned_urls.txt into sources" || echo "No changes"
          git push origin main

      - name: Run Main Collector
        run: |
          cd v2ray_config_collector
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          # Теперь он точно увидит обновленный sources.txt
          python main.py

      - name: Final Cleanup and Push Results
        run: |
          # Собираем все конфиги в один файл, как ты хотел (без дублей)
          mkdir -p v2ray_config_collector/data/sources/working_configs
          cat v2ray_config_collector/data/sources/working_configs/*.txt 2>/dev/null | sort | uniq > merged_all.txt
          mv merged_all.txt v2ray_config_collector/data/sources/working_configs/all.txt
          
          git add v2ray_config_collector/data/sources/working_configs/*.txt
          git commit -m "Update working configs" || echo "No changes"
          git push origin main
