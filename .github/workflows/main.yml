name: Collect and Check Configs

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests
          if [ -f v2ray_config_collector/requirements.txt ]; then pip install -r v2ray_config_collector/requirements.txt; fi

      - name: Run collector
        run: |
          # 1. Заходим в папку проекта
          cd v2ray_config_collector
          
          # 2. Помогаем Python найти папку core
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          
          # 3. Создаем полную структуру (как на твоем ПК)
          mkdir -p data/sources
          mkdir -p data/unique/protocols
          mkdir -p data/validated/working_configs
          mkdir -p data/raw
          mkdir -p data/processed
          
          # 4. Запускаем
          python main.py

      - name: Commit and push results
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # Удаляем мусорные файлы с неправильными именами (\), если они есть
          find . -name "*\\*" -delete || true
          
          git add .
          
          # Проверяем изменения и пушим
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Auto-update: sync structure and duplicate_URL_sources.txt"
            git push
          else
            echo "Изменений не обнаружено"
          fi
