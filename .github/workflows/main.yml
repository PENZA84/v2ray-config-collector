name: "🚀 V2Ray Завод (Парсинг)"

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Чисто, без Node 20 Warning

      - name: Set up Python
        uses: actions/setup-python@v5 # Чисто и быстро
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests tqdm pyyaml 

      - name: Run Collector
        run: |
          cd v2ray_config_collector
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python main.py

      - name: Final Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add v2ray_config_collector/data/validated/*.txt
          if ! git diff --cached --quiet; then
            git commit -m "Update: fresh configs 💋🍀"
            git push origin main
          fi
