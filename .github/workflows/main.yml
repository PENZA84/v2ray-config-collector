name: Collect and Check Configs

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests
          # Если есть requirements.txt в папке v2ray_config_collector
          if [ -f v2ray_config_collector/requirements.txt ]; then pip install -r v2ray_config_collector/requirements.txt; fi

      - name: Run collector
        run: |
          # Переходим в папку проекта (используем точное название с твоего копирования)
          cd v2ray_config_collector
          
          # Создаем структуру папок, чтобы отчеты по протоколам не потерялись
          mkdir -p data/unique/protocols
          mkdir -p data/sources
          mkdir -p data/validated
          
          # Запускаем скрипт. Теперь он увидит папку core и все свои файлы
          python main.py

      - name: Commit and push results
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # Добавляем все изменения во всех папках
          git add .
          
          # Проверяем на изменения и пушим
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update: protocols and dead/duplicate sources"
            git push
          else
            echo "Изменений не обнаружено"
          fi
