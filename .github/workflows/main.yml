name: V2Ray Config Collector - Optimized

on:
  schedule:
    - cron: '0 */6 * * *' # Автозапуск каждые 6 часов
  workflow_dispatch:      # Кнопка для ручного запуска

env:
  # Опережаем график: заставляем GitHub использовать Node.js 24 прямо сейчас
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        # Используем актуальные версии, совместимые с Node 24
        uses: actions/checkout@v4 
        with:
          persist-credentials: true

      - name: Set up Python
        # Используем актуальные версии
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests tqdm pyyaml 

      - name: Run Collector and Validator
        run: |
          cd v2ray_config_collector
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python main.py

      - name: Final Push to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Добавляем результаты (если они есть)
          [ -f v2ray_config_collector/data/validated/all_valid.txt ] && git add -f v2ray_config_collector/data/validated/all_valid.txt
          [ -f v2ray_config_collector/data/unique/dns_list.txt ] && git add -f v2ray_config_collector/data/unique/dns_list.txt
          
          # Очистка грязного файла
          if [ -f v2ray_config_collector/data/unique/deduplicated.txt ]; then
            echo "" > v2ray_config_collector/data/unique/deduplicated.txt
            git add -f v2ray_config_collector/data/unique/deduplicated.txt
          fi

          if ! git diff --cached --quiet; then
            git commit -m "Update: fresh validated configs, cleaned raw data"
            git push origin main
          else
            echo "Изменений нет."
          fi
