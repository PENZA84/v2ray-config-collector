- name: Final Push to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Добавляем рабочие
          git add -f v2ray_config_collector/data/validated/all_valid.txt || true
          git add -f v2ray_config_collector/data/unique/dns_list.txt || true
          
          # 2. УДАЛЯЕМ плохие из репозитория (если они пустые или не нужны)
          # Если в deduplicated.txt ничего нет или он не прошел валидацию - убираем его
          git rm --cached v2ray_config_collector/data/unique/deduplicated.txt || true
          
          if ! git diff --cached --quiet; then
            git commit -m "Update: only working proxies kept"
            git push origin main
          else
            echo "Ничего нового не найдено."
          fi
