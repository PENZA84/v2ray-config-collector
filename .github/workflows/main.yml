- name: Commit and push results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # === ШАГ 0: ГЕНЕРАЛЬНАЯ УБОРКА ПЕРЕД ОБНОВЛЕНИЕМ ===
          # Удаляем временный мусор, чтобы Git разрешил сделать pull
          echo "Очистка временных файлов перед синхронизацией..."
          rm -rf v2ray_config_collector/data/raw/*.txt || true
          find . -name "raw_configs.txt" -delete || true
          find . -name "*.json" -delete || true
          rm -rf v2ray_config_collector/data/validated/working_configs/all_valid.txt || true

          # === ШАГ 1: СИНХРОНИЗАЦИЯ ===
          # Теперь в папке нет гигантов по 100МБ, и pull --rebase пройдет успешно
          git pull origin main --rebase

          TARGET_DIR="v2ray_config_collector/data/sources/working_configs"
          SOURCE_DIR="v2ray_config_collector/data/validated/working_configs"
          mkdir -p "$TARGET_DIR"

          # 2. ОЧИСТКА СТАРЬЯ (30 дней)
          find "$TARGET_DIR" -name "*.txt" -mtime +30 -exec rm {} \;

          # 4. НАРЕЗКА: режем тяжелые файлы, если они > 40МБ
          if [ -d "$SOURCE_DIR" ]; then
            cd "$SOURCE_DIR"
            for f in *.txt; do
              if [ -f "$f" ]; then
                fsize=$(stat -c%s "$f")
                if [ $fsize -gt 41943040 ]; then
                  echo "Файл $f весит $fsize, режем..."
                  split -b 35M "$f" "${f%.txt}_part_" --additional-suffix=.txt
                  rm "$f"
                fi
              fi
            done
            cd -
            
            # 5. ПЕРЕНОС РЕЗУЛЬТАТОВ
            cp "$SOURCE_DIR"/*.txt "$TARGET_DIR/" 2>/dev/null || true
          fi

          # 6. ФИНАЛЬНАЯ ЗАЧИСТКА
          rm -rf v2ray_config_collector/data/validated/

          # 7. ГИТ: СОХРАНЯЕМ ТОЛЬКО НУЖНОЕ
          git add "$TARGET_DIR/*.txt"
          git add "$TARGET_DIR/validated" 2>/dev/null || true
          
          # Убеждаемся, что мы НЕ добавили случайно raw_configs или json
          git reset v2ray_config_collector/data/raw/ 2>/dev/null || true

          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update: 8483 configs, auto-cleanup and sync"
            git push origin main
          else
            echo "No changes detected"
          fi
