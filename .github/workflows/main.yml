name: Глобальный Завод PENZA84 (Раздельный Сбор)

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  production:
    name: производство
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Копируем код
        uses: actions/checkout@v4

      - name: 🐍 Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 Библиотеки
        run: pip install requests beautifulsoup4 pyyaml

      - name: 🧹 Очистка старых файлов перед новой сборкой
        run: |
          if [ -d "data/unique" ]; then
            git rm -rf "data/unique/*.txt" || true
            rm -rf data/unique/*.txt
          fi
          mkdir -p data/unique

      - name: 📡 БАЗОВЫЙ ЦЕХ
        run: python v2ray_config_collector/main.py

      - name: 📡 ТЕЛЕГРАМ-ЦЕХ
        run: python v2ray_config_collector/main1.py

      - name: 💾 Сохранение результатов с твоим точным комментарием
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Robot"
          
          # Кавычки защищают файлы с пробелами при отправке
          git add "data/unique/*.txt"
          
          if git diff --cached --quiet; then
            echo "📊 Изменений нет."
          else
            git commit -m "📦 Конвейер PENZA84: полный переход на легкие цепочки Гитхаб и Телеграмм"
            git pull --rebase origin main
            git push origin main
          fi
