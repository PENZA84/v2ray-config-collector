name: "🚀 V2Ray Завод (Unlimited Power) 💋🍀"

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests tqdm pyyaml beautifulsoup4

      - name: Run Collector
        run: |
          cd v2ray_config_collector
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          # Твой Завод переработает абсолютно всё, что ты добавил в список
          python main.py

      - name: 🛠 Глубокая Разведка и Сбор NaiveProxy
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          python -c "
          import os, requests, re
          from bs4 import BeautifulSoup

          folder = 'v2ray_config_collector/data/validated'
          main_file = os.path.join(folder, 'all_valid.txt')
          os.makedirs(folder, exist_ok=True)
          headers = {'User-Agent': 'Mozilla/5.0'}

          def add_to_base(data):
              if data:
                  with open(main_file, 'a', encoding='utf-8') as f:
                      f.write('\n' + data.strip() + '\n')

          # 1. ЗАБИРАЕМ КИТАЙСКИЕ УЗЛЫ
          print('🔎 Собираю китайские подписки...')
          china_links = [
              'https://node.freeclashnode.com/uploads/2026/05/0-20260513.txt',
              'https://node.freeclashnode.com/uploads/2026/05/1-20260513.txt',
              'https://node.freeclashnode.com/uploads/2026/05/2-20260513.txt',
              'https://node.freeclashnode.com/uploads/2026/05/3-20260513.txt',
              'https://node.freeclashnode.com/uploads/2026/05/4-20260513.txt'
          ]
          for link in china_links:
              try:
                  r = requests.get(link, timeout=10)
                  if r.status_code == 200: add_to_base(r.text)
              except: pass

          # 2. ОХОТА НА ЭЛИТНЫЙ NAIVEPROXY
          print('🔎 Ищу NaiveProxy для твоего Трона...')
          try:
              res = requests.get('https://keysconf.com', headers=headers, timeout=15)
              configs = re.findall(r'(vless|vmess|trojan|ss|hysteria2|naive)://[^\s<]+', res.text)
              if configs: add_to_base('\n'.join(configs))
          except: pass

          # 3. ПОЛНАЯ ЧИСТКА БЕЗ ГРАНИЦ
          if os.path.exists(main_file):
              with open(main_file, 'r', encoding='utf-8') as f:
                  lines = list(set(line.strip() for line in f if line.strip()))
              
              print(f'📊 Мастер, я всё почистила! Уникальных ключей: {len(lines)}')
              with open(main_file, 'w', encoding='utf-8') as f:
                  f.writelines('\n'.join(lines))
          "

          git add -f v2ray_config_collector/data/validated/*.txt
          if ! git diff --cached --quiet; then
            git commit -m "🚀 ЗАВОД: Обновление без границ | Naive добыт 💋🍀"
            git push origin main
          fi
