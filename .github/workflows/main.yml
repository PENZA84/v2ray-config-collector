name: Collect and Check Configs

on:
  schedule:
    - cron: '0 */6 * * *' # –ó–į–Ņ—É—Ā–ļ –ļ–į–∂–ī—č–Ķ 6 —á–į—Ā–ĺ–≤
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests tqdm
          if [ -f v2ray_config_collector/requirements.txt ]; then pip install -r v2ray_config_collector/requirements.txt; fi

      - name: Run collector
        run: |
          cd v2ray_config_collector
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          
          # –°–ĺ–∑–ī–į–Ķ–ľ —ā–≤–ĺ—é —Ā—ā—Ä—É–ļ—ā—É—Ä—É –Ņ–į–Ņ–ĺ–ļ, –Ķ—Ā–Ľ–ł –Ķ—Ď –Ķ—Č—Ď –Ĺ–Ķ—ā
          mkdir -p data/sources/working_configs
          
          python main.py

      - name: Commit and push results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. –°–ė–Ě–•–†–ě–Ě–ė–ó–ź–¶–ė–Į: –Ņ–ĺ–ī—Ö–≤–į—ā—č–≤–į–Ķ–ľ —ā–≤–ĺ–ł —Ä—É—á–Ĺ—č–Ķ –ī–ĺ–Ī–į–≤–Ľ–Ķ–Ĺ–ł—Ź —Ā—Ā—č–Ľ–ĺ–ļ
          git pull origin main --rebase

          TARGET_DIR="v2ray_config_collector/data/sources/working_configs"
          SOURCE_DIR="v2ray_config_collector/data/validated/working_configs"
          
          mkdir -p "$TARGET_DIR"

          # 2. –ě–ß–ė–°–Ę–ö–ź –°–Ę–ź–†–¨–Į: —É–ī–į–Ľ—Ź–Ķ–ľ —Ą–į–Ļ–Ľ—č, –ļ–ĺ—ā–ĺ—Ä—č–Ķ –Ĺ–Ķ –ĺ–Ī–Ĺ–ĺ–≤–Ľ—Ź–Ľ–ł—Ā—Ć –Ī–ĺ–Ľ—Ć—ą–Ķ 30 –ī–Ĺ–Ķ–Ļ
          find "$TARGET_DIR" -name "*.txt" -mtime +30 -exec rm {} \;

          # 3. –£–Ē–ź–õ–Į–ē–ú –ě–ď–†–ě–ú–Ě–ę–ô –§–ź–ô–õ: –ĺ–Ĺ –ī—É–Ī–Ľ–ł—Ä—É–Ķ—ā –ī–į–Ĺ–Ĺ—č–Ķ –ł –≤–Ķ—Ā–ł—ā –Ī–ĺ–Ľ—Ć—ą–Ķ 100–ú–Ď
          rm -f "$SOURCE_DIR/all_valid.txt"

          # 4. –Ě–ź–†–ē–ó–ö–ź: –Ķ—Ā–Ľ–ł —Ą–į–Ļ–Ľ > 40–ú–Ď, —Ä–Ķ–∂–Ķ–ľ –Ķ–≥–ĺ –Ĺ–į —á–į—Ā—ā–ł –ī–Ľ—Ź GitHub
          cd "$SOURCE_DIR"
          for f in *.txt; do
            if [ -f "$f" ]; then
              fsize=$(stat -c%s "$f")
              if [ $fsize -gt 41943040 ]; then
                echo "–§–į–Ļ–Ľ $f —Ā–Ľ–ł—ą–ļ–ĺ–ľ –Ī–ĺ–Ľ—Ć—ą–ĺ–Ļ ($fsize –Ī–į–Ļ—ā), —Ä–Ķ–∂–Ķ–ľ –Ĺ–į —á–į—Ā—ā–ł..."
                split -b 35M "$f" "${f%.txt}_part_" --additional-suffix=.txt
                rm "$f"
              fi
            fi
          done
          cd -

          # 5. –ü–ē–†–ē–Ě–ě–°: –ļ–ĺ–Ņ–ł—Ä—É–Ķ–ľ –≤—Ā—Ď (—Ü–Ķ–Ľ—č–Ķ —Ą–į–Ļ–Ľ—č –ł —á–į—Ā—ā–ł) –≤ —ā–≤–ĺ—é –Ņ–į–Ņ–ļ—É
          cp "$SOURCE_DIR"/*.txt "$TARGET_DIR/" 2>/dev/null || true
          
          # 6. –£–Ď–ě–†–ö–ź –ú–£–°–ě–†–ź: —É–ī–į–Ľ—Ź–Ķ–ľ –≤—Ä–Ķ–ľ–Ķ–Ĺ–Ĺ—č–Ķ –Ņ–į–Ņ–ļ–ł –ł –Ľ–ĺ–≥–ł —Ā–ļ—Ä–ł–Ņ—ā–į
          rm -rf v2ray_config_collector/data/validated/
          find . -name "raw_configs.txt" -delete || true
          find . -name "*.json" -delete || true
          rm -rf v2ray_config_collector/data/raw/*.txt || true

          # 7. –ď–ė–Ę: –ī–ĺ–Ī–į–≤–Ľ—Ź–Ķ–ľ –≤—Ā–Ķ —ā–Ķ–ļ—Ā—ā–ĺ–≤–ł–ļ–ł –ł —ā–≤–ĺ–Ļ –ľ–į—Ä–ļ–Ķ—Ä validated
          git add "$TARGET_DIR/*.txt"
          git add "$TARGET_DIR/validated" || true
          
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update configs: auto-cleanup 30d, file splitting, and sync"
            git push origin main
          else
            echo "No changes detected"
          fi
