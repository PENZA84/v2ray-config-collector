name: Collect and Check Configs

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests tqdm
          if [ -f v2ray_config_collector/requirements.txt ]; then pip install -r v2ray_config_collector/requirements.txt; fi

      - name: Run collector
        run: |
          cd v2ray_config_collector
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          
          # Создаем структуру папок для РАБОЧИХ конфигов
          mkdir -p data/validated/working_configs/VLESS
          mkdir -p data/validated/working_configs/VMESS
          mkdir -p data/validated/working_configs/TROJAN
          mkdir -p data/validated/working_configs/SHADOWSOCKS
          
          python main.py

      - name: Commit and push results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Очистка: удаляем огромные "черновики" (JSON и RAW), чтобы не забивать репозиторий
          find . -name "raw_configs.txt" -delete || true
          find . -name "*.json" -delete || true
          find . -name "*\\*" -delete || true
          find . -name "D:*" -delete || true

          # 2. Сохраняем ТОЛЬКО РЕЗУЛЬТАТ проверки (то, что на твоем скрине)
          # Сохраняем все текстовые файлы из валидированных
          git add "**/data/validated/working_configs/**" || true
          
          # 3. Сохраняем уникальные по протоколам (для страховки)
          git add "**/data/unique/protocols/*.txt" || true
          
          # 4. Сохраняем твои источники
          git add "**/data/sources/*.txt" || true

          # Финальный пуш
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Success: Validated configs sorted by protocol"
            git push origin main
          else
            echo "No new working configs found"
          fi
