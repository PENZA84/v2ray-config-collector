- name: Run collector
        run: |
          # 1. Заходим в папку проекта
          cd v2ray_config_collector
          
          # 2. ЖЕСТКАЯ ОЧИСТКА (удаляем файлы-ошибки из GitHub)
          # Удаляем файл-путь D:\... и "файлы" вместо папок
          rm -rf "data/D:\НЕТ НА ДИСКЕ\Проги\Интернет\VPN\V2ray Collecto\ПАРСИНГ\v2ray-config-collector-main\v2ray_config_collector\data\unique\protocols\\"
          rm -rf "data/processed"
          rm -rf "data/raw"
          rm -rf "data/validated\working_configs"
          
          # На всякий случай чистим всё лишнее в data, кроме папки sources (если она важна)
          find data/ -maxdepth 1 -type f -not -name "sources.txt" -delete || true

          # 3. Настройка путей для Python
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          
          # 4. СОЗДАНИЕ ПРАВИЛЬНОЙ СТРУКТУРЫ (через прямой слеш /)
          mkdir -p data/sources
          mkdir -p data/unique/protocols
          mkdir -p data/validated/working_configs
          mkdir -p data/raw
          mkdir -p data/processed
          
          # 5. Проверка файла источников
          if [ ! -f data/sources/sources.txt ]; then touch data/sources/sources.txt; fi
          
          # 6. ЗАПУСК
          python main.py
