name: Collect and Check Configs

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests tqdm
          if [ -f v2ray_config_collector/requirements.txt ]; then pip install -r v2ray_config_collector/requirements.txt; fi

      - name: Run collector
        run: |
          cd v2ray_config_collector
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          
          # Создаем структуру папок, чтобы Git их точно увидел
          mkdir -p data/validated/working_configs/VLESS
          mkdir -p data/validated/working_configs/VMESS
          mkdir -p data/validated/working_configs/TROJAN
          mkdir -p data/validated/working_configs/SHADOWSOCKS
          
          # Твоя идея с файлом-заглушкой, чтобы папки не считались пустыми
          touch data/validated/working_configs/VLESS/.gitkeep
          touch data/validated/working_configs/VMESS/.gitkeep
          touch data/validated/working_configs/TROJAN/.gitkeep
          touch data/validated/working_configs/SHADOWSOCKS/.gitkeep
          
          python main.py

      - name: Commit and push results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Очистка: удаляем тяжелые файлы, чтобы репозиторий не тормозил
          find . -name "raw_configs.txt" -delete || true
          find . -name "*.json" -delete || true
          find . -name "*\\*" -delete || true
          find . -name "D:*" -delete || true
          rm -rf v2ray_config_collector/data/raw/*.txt || true

          # 2. Сохраняем результаты (validated, уникальные и источники)
          git add "**/data/validated/working_configs/**" || true
          git add "**/data/unique/protocols/*.txt" || true
          git add "**/data/sources/*.txt" || true
          
          # 3. Финальный пуш всех изменений
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Success: Validated configs sorted by protocol (v2rayN ready)"
            git push origin main
          else
            echo "No new working configs found"
          fi
